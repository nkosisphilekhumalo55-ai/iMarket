<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iMarket</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:#0a0a0a;
color:white;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(10,10,10,0.7);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:1000;
}

nav h1{
font-size:20px;
}

nav input{
padding:8px 12px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
}

/* ICONS */
.nav-icons{
display:flex;
gap:12px;
align-items:center;
}

.icon{
width:46px;
height:46px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
border-radius:14px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(18px);
text-decoration:none;
transition:0.2s;
}

.icon:hover{
background:rgba(255,255,255,0.15);
transform:translateY(-2px);
}

.icon svg{
width:22px;
height:22px;
stroke:white;
fill:none;
stroke-width:2;
}

.icon span{
position:absolute;
top:-6px;
right:-6px;
background:white;
color:black;
font-size:10px;
width:16px;
height:16px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-weight:600;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle,#1a1a1a,#000);
}

.hero h2{
font-size:55px;
}

.hero p{
color:#aaa;
margin-top:10px;
}

.hero button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
cursor:pointer;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:120px 30px 60px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:20px;
text-align:center;
backdrop-filter:blur(15px);
}

.card img{
width:160px;
height:240px;
object-fit:contain;
display:block;
margin:auto;
}

.card p{
color:#aaa;
}

/* BUTTONS */
.btn{
width:100%;
margin-top:8px;
padding:10px;
border-radius:12px;
border:none;
cursor:pointer;
background:rgba(255,255,255,0.1);
color:white;
transition:0.2s;
}

.btn:hover{
background:rgba(255,255,255,0.2);
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#2a2a2a;
padding:12px 18px;
border-radius:30px;
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>

<input type="text" id="search" placeholder="Search products...">

<h1>iMarket</h1>

<div class="nav-icons">

<!-- LOGIN -->
<a href="login.html" class="icon">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="8" r="4"></circle>
<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
</svg>
</a>

<!-- WISHLIST -->
<a href="wishlist.html" class="icon">
<svg viewBox="0 0 24 24">
<path d="M12 21s-7-5-10-9C0 8 3 5 6 5c2 0 3.5 1 6 3 2.5-2 4-3 6-3 3 0 6 3 4 7-2 4-10 9-10 9z"></path>
</svg>
<span id="wishlistCount">0</span>
</a>

<!-- CART -->
<a href="cart.html" class="icon">
<svg viewBox="0 0 24 24">
<path d="M7 8h10l1 13H6l1-13z"></path>
<path d="M9 8a3 3 0 0 1 6 0"></path>
</svg>
<span id="cartCount">0</span>
</a>

</div>

</nav>

<!-- HERO -->
<div class="hero">
<h2>iMarket</h2>
<p>Premium Apple Devices</p>
<button onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})">
Shop Now
</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="shop"></div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/27706418906" target="_blank">
WhatsApp Order
</a>

<script>

/* DATA */
let products = [
{name:"iPhone 15", price:17999, img:"https://store.storeimages.cdn-apple.com/iphone15.jpg"},
{name:"iPhone 14", price:13999, img:"https://store.storeimages.cdn-apple.com/iphone14.jpg"},
{name:"iPad Pro", price:22999, img:"https://store.storeimages.cdn-apple.com/ipadpro.jpg"}
];

/* STORAGE */
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

/* RENDER PRODUCTS */
function render(){

let html = "";

products.forEach(p=>{

html += `
<div class="card">

<img src="${p.img}">
<h4>${p.name}</h4>
<p>R${p.price}</p>

<button class="btn" onclick="addToCart('${p.name}',${p.price},'${p.img}')">
Add to Cart
</button>

<button class="btn" onclick="addToWishlist('${p.name}')">
Wishlist
</button>

</div>
`;

});

document.getElementById("shop").innerHTML = html;

}

/* CART */
function addToCart(name, price, img){

cart.push({name, price, img});
localStorage.setItem("cart", JSON.stringify(cart));
document.getElementById("cartCount").innerText = cart.length;

}

/* WISHLIST */
function addToWishlist(name){

wishlist.push(name);
localStorage.setItem("wishlist", JSON.stringify(wishlist));
document.getElementById("wishlistCount").innerText = wishlist.length;

}

/* SEARCH */
document.getElementById("search").addEventListener("input", function(){

let val = this.value.toLowerCase();

let filtered = products.filter(p =>
p.name.toLowerCase().includes(val)
);

let html = "";

filtered.forEach(p=>{

html += `
<div class="card">

<img src="${p.img}">
<h4>${p.name}</h4>
<p>R${p.price}</p>

<button class="btn" onclick="addToCart('${p.name}',${p.price},'${p.img}')">
Add to Cart
</button>

<button class="btn" onclick="addToWishlist('${p.name}')">
Wishlist
</button>

</div>
`;

});

document.getElementById("shop").innerHTML = html;

});

/* INIT */
render();
document.getElementById("cartCount").innerText = cart.length;
document.getElementById("wishlistCount").innerText = wishlist.length;

</script>

</body>
</html>
