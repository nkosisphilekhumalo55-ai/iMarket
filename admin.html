[01:44, 16/04/2026] Nkosisphile: <!DOCTYPE html>
<html>
<head>
<title>iMarket Admin</title>

<style>
body {
  background:#0a0a0a;
  color:white;
  font-family: Arial;
  padding: 30px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}

.card {
  background:#1a1a1a;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

img {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🍏 iMarket Admin</h1>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price (R)">
<input id="image" placeholder="Image URL (paste link)">

<button onclick="addProduct()">Add Product</button>

<h2>Preview</h2>
<div id="preview"></div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

/* ADD PRODUCT */
function addProduct() {
  let product = {
    name: document.getElementById("name").value,
    price: document.getElementById("price").value,
    image: document.getElementById("image").value
  };

  products.push(product);
  localStorage.setItem("products", JSON.stringify(products));

  alert("Product added ✔");
  render();
}

/* PREVIEW */
function render() {
  document.getElementById("preview").innerHTML =
    products.map(p => `
      <div class="card">
        <h3>${p.name}</h3>
        <p>R${p.price}</p>
        <img src="${p.image}">
      </div>
    `).join("");
}

render();
</script>

</body>
</html>
