<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Cart - iMarket</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

header a {
  color: white;
  text-decoration: none;
  background: rgba(255,255,255,0.1);
  padding: 8px 14px;
  border-radius: 10px;
}

/* CART CONTAINER */
.container {
  padding: 40px;
}

/* ITEM CARD */
.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  margin: 12px 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
}

/* EMPTY STATE */
.empty {
  color: #aaa;
  margin-top: 20px;
}

/* TOTAL */
.total {
  margin-top: 30px;
  font-size: 18px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
}

/* CLEAR BUTTON */
button {
  margin-top: 20px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: white;
}
</style>
</head>

<body>

<header>
  <h2>🛒 Your Cart</h2>
  <a href="index.html">← Back to Shop</a>
</header>

<div class="container" id="cartBox"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let box = document.getElementById("cartBox");

function renderCart() {
  box.innerHTML = "";

  if (cart.length === 0) {
    box.innerHTML = "<p class='empty'>Your cart is empty</p>";
    return;
  }

  cart.forEach((item, index) => {
    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${item}</span>
      <button onclick="removeItem(${index})">Remove</button>
    `;

    box.appendChild(div);
  });

  let total = document.createElement("div");
  total.className = "total";
  total.innerText = "Total items: " + cart.length;

  let clearBtn = document.createElement("button");
  clearBtn.innerText = "Clear Cart";
  clearBtn.onclick = clearCart;

  box.appendChild(total);
  box.appendChild(clearBtn);
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function clearCart() {
  cart = [];
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

renderCart();
</script>

</body>
</html>
